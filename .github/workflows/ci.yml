name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi
      - run: go vet ./...
      - name: Check for dead code
        run: |
          dead=$(GOTOOLCHAIN=local go run golang.org/x/tools/cmd/deadcode@v0.46.0 -test ./...)
          if [ -n "$dead" ]; then
            echo "Unreachable (dead) code found:"
            echo "$dead"
            exit 1
          fi
      - run: go test -race ./...
      - run: go build ./cmd/lazyskills
